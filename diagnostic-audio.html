<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Audio CAPTCHA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .diagnostic {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #0f766e;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .check-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #cbd5e1;
        }
        .check-item.pass {
            background: #d4edda;
            border-left-color: #28a745;
        }
        .check-item.fail {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        .check-icon {
            font-size: 24px;
            margin-right: 15px;
            width: 30px;
        }
        .check-content {
            flex: 1;
        }
        .check-label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 16px;
        }
        .check-detail {
            font-size: 13px;
            color: #666;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #0f766e;
            color: white;
        }
        .btn-primary:hover {
            background: #0c5f58;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #0f766e;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 6px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.error {
            background: #fef2f2;
            border-color: #ef4444;
        }
        .summary {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            text-align: center;
        }
        .summary-status {
            font-size: 48px;
            margin: 10px 0;
        }
        .summary-text {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="diagnostic">
        <h1>🔍 Diagnostic Audio</h1>

        <div id="checks"></div>

        <div class="button-group">
            <button class="btn-primary" onclick="runDiagnostics()">🔄 Réanalyser</button>
            <button class="btn-secondary" onclick="testAudioOutput()">🔊 Test Son</button>
            <button class="btn-secondary" onclick="openTestPage()">📄 Page Test</button>
        </div>

        <div class="result" id="result"></div>

        <div class="summary" id="summary" style="display: none;">
            <div class="summary-status" id="status-icon"></div>
            <div class="summary-text" id="status-text"></div>
        </div>
    </div>

    <script>
        async function runDiagnostics() {
            const checks = [];

            // Check 1: Web Audio API
            const audioCtxAvailable = !!(window.AudioContext || window.webkitAudioContext);
            checks.push({
                name: 'Web Audio API',
                pass: audioCtxAvailable,
                detail: audioCtxAvailable ? 'Disponible' : 'Non disponible'
            });

            // Check 2: Audio Context
            let audioCtx = null;
            let audioCtxCreated = false;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtxCreated = true;
            } catch(e) {
                audioCtxCreated = false;
            }

            checks.push({
                name: 'Audio Context Création',
                pass: audioCtxCreated,
                detail: audioCtxCreated ? 'Contexte créé' : 'Erreur: ' + (e?.message || 'Inconnu')
            });

            // Check 3: Audio State
            let stateCheck = false;
            if (audioCtx) {
                stateCheck = audioCtx.state !== undefined;
                checks.push({
                    name: 'Audio State',
                    pass: true,
                    detail: 'État: ' + audioCtx.state
                });
            }

            // Check 4: Oscillator
            let oscillatorCheck = false;
            if (audioCtx) {
                try {
                    const osc = audioCtx.createOscillator();
                    oscillatorCheck = true;
                } catch(e) {
                    oscillatorCheck = false;
                }
            }

            checks.push({
                name: 'Oscillateur Création',
                pass: oscillatorCheck,
                detail: oscillatorCheck ? 'Oscillateur créé' : 'Erreur création'
            });

            // Check 5: Sample Rate
            if (audioCtx) {
                checks.push({
                    name: 'Sample Rate',
                    pass: audioCtx.sampleRate > 0,
                    detail: audioCtx.sampleRate + ' Hz'
                });
            }

            // Afficher les résultats
            displayChecks(checks);

            // Résumé
            const passCount = checks.filter(c => c.pass).length;
            const totalCount = checks.length;
            displaySummary(passCount, totalCount);
        }

        function displayChecks(checks) {
            const html = checks.map(check => `
                <div class="check-item ${check.pass ? 'pass' : 'fail'}">
                    <div class="check-icon">${check.pass ? '✅' : '❌'}</div>
                    <div class="check-content">
                        <div class="check-label">${check.name}</div>
                        <div class="check-detail">${check.detail}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('checks').innerHTML = html;
        }

        function displaySummary(pass, total) {
            const summary = document.getElementById('summary');
            const statusIcon = document.getElementById('status-icon');
            const statusText = document.getElementById('status-text');

            const percentage = Math.round((pass / total) * 100);
            const isPassed = pass === total;

            statusIcon.textContent = isPassed ? '✅' : '⚠️';
            statusText.textContent = `${pass}/${total} vérifications réussies (${percentage}%)`;

            summary.style.display = 'block';
            if (!isPassed) {
                summary.style.background = '#fef2f2';
                statusIcon.textContent = '⚠️';
            }
        }

        function testAudioOutput() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.frequency.value = 1000; // 1kHz
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                gain.gain.setValueAtTime(0.5, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);

                osc.start(now);
                osc.stop(now + 0.5);

                showResult('✅ Son testé avec succès! Vous devriez avoir entendu un bip.', false);
            } catch(e) {
                showResult('❌ Erreur: ' + e.message, true);
            }
        }

        function showResult(message, isError) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.classList.add('show');
            if (isError) result.classList.add('error');
            else result.classList.remove('error');
        }

        function openTestPage() {
            window.location.href = './test-audio-captcha.html';
        }

        // Lancer au chargement
        window.addEventListener('load', runDiagnostics);
    </script>
</body>
</html>
