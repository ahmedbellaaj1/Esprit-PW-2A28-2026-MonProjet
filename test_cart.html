<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Cart - GreenBite</title>
</head>
<body>
<h1>Test du Système de Panier</h1>

<div id="results"></div>

<script>
const resultsDiv = document.getElementById('results');

function addResult(text, type = 'info') {
    const p = document.createElement('p');
    p.textContent = text;
    p.style.padding = '10px';
    p.style.marginBottom = '5px';
    p.style.borderRadius = '4px';
    if (type === 'success') {
        p.style.background = '#dcfce7';
        p.style.color = '#166534';
    } else if (type === 'error') {
        p.style.background = '#fee2e2';
        p.style.color = '#991b1b';
    } else {
        p.style.background = '#f0f4f8';
        p.style.color = '#0f172a';
    }
    resultsDiv.appendChild(p);
}

// Test localStorage
try {
    localStorage.setItem('test', 'value');
    localStorage.removeItem('test');
    addResult('✓ localStorage est fonctionnel', 'success');
} catch(e) {
    addResult('✗ localStorage n\'est pas disponible: ' + e.message, 'error');
}

// Charger le script cart.js
const script = document.createElement('script');
script.src = '/WEB/View/assets/cart.js';
script.onload = function() {
    addResult('✓ Script cart.js chargé avec succès', 'success');
    
    // Tester la classe Cart
    try {
        if (typeof cart !== 'undefined') {
            addResult('✓ Instance "cart" est définie', 'success');
            
            // Tester les méthodes
            const count = cart.getCount();
            addResult(`✓ cart.getCount() retourne: ${count}`, 'success');
            
            // Tester addItem
            cart.addItem({
                id_produit: 1,
                nom: 'Test Produit',
                marque: 'Test Marque',
                prix: 10.50,
                image: 'test.jpg',
                quantite: 2
            });
            
            const newCount = cart.getCount();
            addResult(`✓ Produit ajouté! Nouveau count: ${newCount}`, 'success');
            
            // Tester getTotal
            const total = cart.getTotal();
            addResult(`✓ Total du panier: ${total} DT`, 'success');
            
            // Tester fonction addProductToCart
            if (typeof addProductToCart !== 'undefined') {
                addResult('✓ Fonction addProductToCart est définie', 'success');
            } else {
                addResult('✗ Fonction addProductToCart n\'est pas définie', 'error');
            }
            
            // Afficher les items
            const items = cart.getItems();
            addResult(`✓ Items dans le panier: ${JSON.stringify(items)}`, 'info');
            
        } else {
            addResult('✗ Instance "cart" n\'est pas définie', 'error');
        }
    } catch(e) {
        addResult('✗ Erreur lors des tests: ' + e.message, 'error');
    }
};

script.onerror = function() {
    addResult('✗ Erreur lors du chargement de cart.js', 'error');
};

document.body.appendChild(script);

// Test les variables globales
setTimeout(function() {
    addResult('=== Tests des variables globales ===', 'info');
    
    if (typeof cart !== 'undefined') {
        addResult('✓ Variable "cart" est disponible globalement', 'success');
    } else {
        addResult('✗ Variable "cart" n\'est pas disponible globalement', 'error');
    }
    
    if (typeof addProductToCart !== 'undefined') {
        addResult('✓ Fonction "addProductToCart" est disponible globalement', 'success');
    } else {
        addResult('✗ Fonction "addProductToCart" n\'est pas disponible globalement', 'error');
    }
    
    if (typeof updateCartBadge !== 'undefined') {
        addResult('✓ Fonction "updateCartBadge" est disponible globalement', 'success');
    } else {
        addResult('✗ Fonction "updateCartBadge" n\'est pas disponible globalement', 'error');
    }
}, 1000);

</script>

</body>
</html>
