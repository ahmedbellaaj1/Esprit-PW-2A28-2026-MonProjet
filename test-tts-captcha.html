<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech CAPTCHA Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #0f766e;
            margin-bottom: 10px;
            text-align: center;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-section {
            background: #f8fafc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 4px solid #14b8a6;
        }
        .test-section h2 {
            color: #0f766e;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .control-group {
            margin: 15px 0;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }
        input[type="text"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
        }
        .value-display {
            text-align: center;
            font-weight: bold;
            color: #0f766e;
            margin-top: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #0f766e;
            color: white;
        }
        .btn-primary:hover {
            background: #0c5f58;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #0f766e;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .voice-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin: 10px 0;
        }
        .voice-item {
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .voice-item:hover {
            background: #f1f5f9;
        }
        .voice-item.selected {
            background: #d4edda;
            font-weight: bold;
        }
        .example-box {
            background: white;
            padding: 15px;
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 CAPTCHA Text-to-Speech Test</h1>
        <p class="subtitle">Test the audio reading feature for the CAPTCHA</p>

        <div class="test-section">
            <h2>1️⃣ Simple Speech Test</h2>
            <div class="control-group">
                <label for="simple-text">Text to speak:</label>
                <input type="text" id="simple-text" value="Hello World" placeholder="Enter text">
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="speakSimpleText()">🔊 Speak</button>
                <button class="btn-danger" onclick="stopSpeech()">⏹️ Stop</button>
            </div>
            <div id="simple-status" class="status"></div>
        </div>

        <div class="test-section">
            <h2>2️⃣ CAPTCHA Code Test</h2>
            <div class="control-group">
                <label for="captcha-code">CAPTCHA Code:</label>
                <input type="text" id="captcha-code" value="ABC123" placeholder="e.g., ABC123">
                <div class="example-box">Example: ABC123 → will say "A B C 1 2 3"</div>
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="speakCaptchaCode()">🔊 Speak CAPTCHA</button>
                <button class="btn-danger" onclick="stopSpeech()">⏹️ Stop</button>
            </div>
            <div id="captcha-status" class="status"></div>
        </div>

        <div class="test-section">
            <h2>3️⃣ Voice Settings</h2>
            <div class="control-group">
                <label for="speech-rate">Speed:</label>
                <input type="range" id="speech-rate" min="0.5" max="2" step="0.1" value="0.8">
                <div class="value-display"><span id="rate-value">0.8</span>x</div>
            </div>
            <div class="control-group">
                <label for="speech-pitch">Pitch:</label>
                <input type="range" id="speech-pitch" min="0.5" max="2" step="0.1" value="1">
                <div class="value-display"><span id="pitch-value">1</span></div>
            </div>
            <div class="control-group">
                <label for="speech-volume">Volume:</label>
                <input type="range" id="speech-volume" min="0" max="1" step="0.1" value="1">
                <div class="value-display"><span id="volume-value">100</span>%</div>
            </div>
            <div class="control-group">
                <label for="speech-lang">Language:</label>
                <select id="speech-lang">
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="fr-FR">French</option>
                    <option value="es-ES">Spanish</option>
                    <option value="de-DE">German</option>
                </select>
            </div>
        </div>

        <div class="test-section">
            <h2>4️⃣ Available Voices</h2>
            <div id="voice-list" class="voice-list">
                <div style="padding: 10px; text-align: center; color: #999;">Loading voices...</div>
            </div>
        </div>

        <div class="test-section">
            <h2>5️⃣ Browser Support</h2>
            <div id="browser-support"></div>
        </div>
    </div>

    <script>
        // Update range displays
        document.getElementById('speech-rate').addEventListener('change', function() {
            document.getElementById('rate-value').textContent = this.value;
        });
        document.getElementById('speech-pitch').addEventListener('change', function() {
            document.getElementById('pitch-value').textContent = this.value;
        });
        document.getElementById('speech-volume').addEventListener('change', function() {
            document.getElementById('volume-value').textContent = Math.round(this.value * 100);
        });

        // Check browser support
        function checkBrowserSupport() {
            const synth = window.speechSynthesis;
            const supported = !!synth;
            const html = supported ? 
                '<div class="status success show">✅ Web Speech API supported</div>' :
                '<div class="status error show">❌ Web Speech API not supported</div>';
            document.getElementById('browser-support').innerHTML = html;
        }

        // Load available voices
        function loadVoices() {
            const synth = window.speechSynthesis;
            const voices = synth.getVoices();
            const container = document.getElementById('voice-list');
            
            if (voices.length === 0) {
                container.innerHTML = '<div style="padding: 10px; text-align: center; color: #999;">No voices available</div>';
                return;
            }

            let html = '';
            voices.forEach((voice, index) => {
                html += `<div class="voice-item" onclick="selectVoice(${index})">
                    ${voice.name} (${voice.lang})
                    ${voice.default ? ' <strong>[Default]</strong>' : ''}
                </div>`;
            });
            container.innerHTML = html;
        }

        var selectedVoiceIndex = 0;
        function selectVoice(index) {
            selectedVoiceIndex = index;
            document.querySelectorAll('.voice-item').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
        }

        function speakText(text, statusId) {
            if (!window.speechSynthesis) {
                showStatus('Web Speech API not supported', statusId, 'error');
                return;
            }

            // Cancel previous speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = parseFloat(document.getElementById('speech-rate').value);
            utterance.pitch = parseFloat(document.getElementById('speech-pitch').value);
            utterance.volume = parseFloat(document.getElementById('speech-volume').value);
            utterance.lang = document.getElementById('speech-lang').value;

            const voices = window.speechSynthesis.getVoices();
            if (voices.length > selectedVoiceIndex) {
                utterance.voice = voices[selectedVoiceIndex];
            }

            utterance.onstart = function() {
                showStatus('🔊 Speaking...', statusId, 'info');
            };
            utterance.onend = function() {
                showStatus('✅ Done!', statusId, 'success');
            };
            utterance.onerror = function(e) {
                showStatus('❌ Error: ' + e.error, statusId, 'error');
            };

            window.speechSynthesis.speak(utterance);
        }

        function speakSimpleText() {
            const text = document.getElementById('simple-text').value;
            if (!text) {
                showStatus('Please enter text', 'simple-status', 'error');
                return;
            }
            speakText(text, 'simple-status');
        }

        function speakCaptchaCode() {
            const code = document.getElementById('captcha-code').value;
            if (!code) {
                showStatus('Please enter a CAPTCHA code', 'captcha-status', 'error');
                return;
            }
            // Speak each character separately
            const spokenText = code.split('').join(' ');
            speakText(spokenText, 'captcha-status');
        }

        function stopSpeech() {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.status').forEach(el => el.classList.remove('show'));
        }

        function showStatus(message, statusId, type) {
            const status = document.getElementById(statusId);
            status.textContent = message;
            status.className = 'status ' + type + ' show';
        }

        // Initialize on load
        window.addEventListener('load', function() {
            checkBrowserSupport();
            
            // Load voices with delay if needed
            if (window.speechSynthesis.getVoices().length === 0) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            } else {
                loadVoices();
            }
        });
    </script>
</body>
</html>
