    <style>
        .home-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 68px); /* minus navbar height */
            padding: 2rem;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
        }
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .form-card h2 {
            color: #0f766e;
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;

            transition: border-color 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #0f766e;
        }
        .submit-btn {
            width: 100%;

        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a class="navbar-logo" href="index.html">Greenbite</a>

    <div class="navbar-links">
        <a class="active" href="index.html">Accueil</a>
        <a href="greenbite/index.php">Dashboard</a>
        <a href="view/backoffice.php">Back Office</a>
    </div>

    <div class="navbar-right">
        <div class="nav-avatar"><i class="fas fa-user"></i></div>
    </div>
</nav>

<!-- FORMULAIRE -->
<div class="home-container">
    <div class="form-card">
        <h2>🌿 Créez votre profil Greenbite</h2>
        
        <form id="form">
            <div class="input-group">
                <label for="nom">Nom complet</label>
                <input type="text" id="nom" class="form-input" placeholder="Ex: Jean Dupont" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="Ex: jean.dupont@email.com" required>
            </div>

            <div class="input-group">
                <label for="preferences">Préférences alimentaires</label>
                <input type="text" id="preferences" class="form-input" placeholder="Ex: Végétarien, Sans gluten..." required>
            </div>

            <div class="input-group">
                <label for="allergies">Allergies</label>
                <input type="text" id="allergies" class="form-input" placeholder="Ex: Arachides, Lactose..." required>
            </div>

            <div style="display: flex; gap: 16px;">
                <div class="input-group" style="flex: 1;">
                    <label for="poids">Poids (kg)</label>
                    <input type="number" id="poids" class="form-input" placeholder="Ex: 70" required>
                </div>

                <div class="input-group" style="flex: 1;">
                    <label for="age">Âge</label>
                    <input type="number" id="age" class="form-input" placeholder="Ex: 25" required>
                </div>
            </div>

            <div class="input-group">
                <label for="calories">Calories visées / jour</label>
                <input type="number" id="calories" class="form-input" placeholder="Ex: 2000" required>
            </div>

            <button type="submit" class="primary-btn submit-btn">
                <i class="fas fa-save"></i> Enregistrer & Télécharger PDF
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = new URLSearchParams();
    data.append("nom", document.getElementById("nom").value);
    data.append("email", document.getElementById("email").value);
    data.append("preferences", document.getElementById("preferences").value);
    data.append("allergies", document.getElementById("allergies").value);
    data.append("poids", document.getElementById("poids").value);
    data.append("age", document.getElementById("age").value);
    data.append("calories", document.getElementById("calories").value);

    try {
        const form = document.createElement("form");
        form.method = "POST";
        form.action = "http://localhost/PROJET%202A28/api/register.php";
        form.target = "_blank"; // Download PDF in new tab so current page can redirect smoothly

        for (let pair of data.entries()) {
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = pair[0];
            input.value = pair[1];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();

        // Redirect to dashboard after starting the PDF download
        setTimeout(() => {
            window.location.href = "greenbite/index.php";
        }, 1500);

    } catch (err) {
        console.error(err);
        alert("❌ Erreur serveur");
    }
});
</script>

</body>
</html>
