<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="50" height="50">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="#0f766e" stroke="#14b8a6" stroke-width="3"/>
  
  <!-- Leaf shape (stylized green bite) -->
  <g transform="translate(100, 100)">
    <!-- Left leaf -->
    <ellipse cx="-20" cy="-10" rx="15" ry="25" fill="#22d3ee" transform="rotate(-35)"/>
    <!-- Right leaf -->
    <ellipse cx="20" cy="-10" rx="15" ry="25" fill="#14b8a6" transform="rotate(35)"/>
    <!-- Bite mark (circle cutout) -->
    <circle cx="25" cy="5" r="12" fill="white"/>
    <!-- Apple body -->
    <circle cx="0" cy="15" r="22" fill="#14b8a6"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="180" font-size="16" font-weight="bold" fill="white" text-anchor="middle">GreenBite</text>
</svg>
